<html>
    <head>
        <title>DEBRIS</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="landscape.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/x-icon" href="icon.ico">

    <body>
        <canvas id="gameCanvas" width="1000" height="1000"></canvas>

        <!-- <p class="version">26.5.5.a</p> -->

        
         
            <div class="lowerHUD">
                <div id="tipsContainer" class="tips">

                <div class="mainMenu menu" id="mainMenu">
                    <button id="riseButton" class="">RISE</button>
                    <button id="boostButton" class="">BOOST</button>
                    <button id="deviceButton" class="wideButton redButton menuButton">DEPLOY<br>MENU</button>
                    <button id="dropButton" class="">DROP</button>
                    <button id="planetSelectButton" class="redButton menuButton">SOL. SYS.</button>
                    <button id="upgradeButton" class="wideButton redButton menuButton">UPGRADE MENU</button>

                <!-- Device Menu -->
                <div class="deviceMenu menu" id="deviceMenu">

                    <button class="wideButton redButton deviceMenuTwoButton">NEXT</button>

                <div class="deviceMenuTwo menu" id="deviceMenuTwo">

                    <button class="wideButton redButton deviceMenuOneButton">BACK</button>

                     <button class="wideButton redButton returnButton">RETURN</button>

                    <button class="threeWideButton redButton returnButton">RETURN</button>
                    <button id="resetButton" class="holdButton">RESET</button>

                 </div>


                 <!-- Planet Select Menu -->

                    <button id="previousPlanetButton" class="redButton">PREV</button>
                    <button id="nextPlanetButton" class="redButton">NEXT</button>
                    <button id="travelButton" class="holdButton wideButton">TRAVEL</button>
                    <button id="cancelPeekButton" class="hugeButton redButton returnButton">RETURN</button>
