<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Arena</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #000;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #fff;
            border: 4px solid #000;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #top-bar {
            background-color: rgba(255, 255, 255, 0.9);
            border-bottom: 2px solid #000;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #question-box {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;
        }

        #stats {
            font-size: 16px;
            white-space: nowrap;
        }

        #feedback-box {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }

        #answers-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .answer-box {
            position: absolute;
            background: #fff;
            border: 2px solid #000;
            box-sizing: border-box;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 5px;
            font-size: 16px;
        }
        .fraction .num { border-bottom: 2px solid #000; padding: 0 4px; }
        .fraction .den { padding: 0 4px; }

        .menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            border: 4px solid #000;
            padding: 20px;
            text-align: center;
            pointer-events: auto;
            display: none;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            max-height: 80vh;
            overflow-y: auto;
            width: 300px;
        }

        .menu h2 { margin-top: 0; }
        .menu button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
            background-color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu button:hover {
            background-color: #000;
            color: #fff;
        }
        
        #btn-shop-open {
            pointer-events: auto;
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-family: inherit;
            background: #fff;
            border: 2px solid #000;
            padding: 5px 10px;
            cursor: pointer;
        }
        #btn-shop-open:hover { background: #000; color: #fff; }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div id="top-bar">
            <div id="stats">Health: <span id="ui-health">10</span> | Coins: <span id="ui-coins">0</span></div>
            <div id="question-box">Loading...</div>
            <div style="width: 150px;"></div>
        </div>
        
        <div id="answers-layer"></div>
        <div id="feedback-box"></div>
        <button id="btn-shop-open">Shop (Space)</button>
    </div>

    <div id="shop-menu" class="menu">
        <h2>Upgrades</h2>
        <p>Coins: <span id="shop-coins">0</span></p>
        <button id="upg-speed">Move Speed (Cost: <span id="cost-speed">10</span>)</button>
        <button id="upg-fire">Fire Rate (Cost: <span id="cost-fire">15</span>)</button>
        <button id="upg-dmg">Damage (Cost: <span id="cost-dmg">20</span>)</button>
        <button id="upg-hp">Heal + Max HP (Cost: <span id="cost-hp">15</span>)</button>
        <hr>
        <button id="upg-orb">Orbiting Orb (Cost: <span id="cost-orb">30</span>)</button>
        <button id="upg-auto">Auto-Turret (Cost: <span id="cost-auto">40</span>)</button>
        <button id="btn-shop-close" style="margin-top: 20px; border-style: dashed;">Resume</button>
    </div>

    <div id="game-over-menu" class="menu">
        <h2>Game Over</h2>
        <p>You survived and learned algebra.</p>
        <button onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const answersLayer = document.getElementById('answers-layer');

    // Game State
    let isPaused = false;
    let isGameOver = false;
    let coins = 0;
    let questionsAnswered = 0;
    
    // Entities
    const player = {
        x: 400, y: 300, size: 20, 
        speed: 3, maxHealth: 10, health: 10,
        damage: 1, fireRate: 500,
        lastShot: 0
    };

    // Special Upgrades
    let numOrbiters = 0;
    let orbiterAngle = 0;
    
    let autoShootLevel = 0;
    let lastAutoShoot = 0;

    let bullets = [];
    let enemies = [];
    let answers = [];
    
    let currentQuestion = null;
    let questionActive = false;

    // Upgrades Cost
    let costs = { speed: 10, fire: 15, dmg: 20, hp: 15, orb: 30, auto: 40 };

    // Input Handling
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // Math Question Generator with Difficulty Scaling
    function generateMathProblem() {
        const difficulty = Math.floor(questionsAnswered / 3);
        
        const variables = ['x', 'y', 'a', 'b', 'n'];
        const v = variables[Math.floor(Math.random() * variables.length)];
        const n1 = Math.floor(Math.random() * 8) + 2;
        const n2 = Math.floor(Math.random() * 8) + 2; 

        let templates = [];

        // Tier 0
        templates.push(
            { q: `${n1} more than ${v}`, a: `${v} + ${n1}`, w: [`${n1}${v}`, `${v} - ${n1}`, `${n1} - ${v}`] },
            { q: `${n1} less than ${v}`, a: `${v} - ${n1}`, w: [`${v} + ${n1}`, `${n1} - ${v}`, `${n1}${v}`] },
            { q: `the product of ${n1} and ${v}`, a: `${n1}${v}`, w: [`${v} + ${n1}`, `frac(${v},${n1})`, `frac(${n1},${v})`] }
        );

        // Tier 1
        if (difficulty >= 1) {
            templates.push(
                { q: `the quotient of ${v} and ${n1}`, a: `frac(${v},${n1})`, w: [`frac(${n1},${v})`, `${n1}${v}`, `${v} - ${n1}`] }
            );
        }

        // Tier 2+
        if (difficulty >= 2) {
            templates.push(
                { q: `the sum of ${n1} and ${v}, multiplied by ${n2}`, a: `${n2}(${v} + ${n1})`, w: [`${n2}${v} + ${n1}`, `${v}(${n2} + ${n1})`, `${n1}(${v} + ${n2})`] },
                { q: `${n2} less than the quotient of ${v} and ${n1}`, a: `frac(${v},${n1}) - ${n2}`, w: [`frac(${v},${n2}) - ${n1}`, `frac(${v} - ${n2},${n1})`, `${n2} - frac(${v},${n1})`] }
            );
        }

        let type = templates[Math.floor(Math.random() * templates.length)];
        
        const formatMath = (str) => {
            return str.replace(/frac\(([^,]+),([^)]+)\)/g, '<div class="fraction"><span class="num">$1</span><span class="den">$2</span></div>');
        };

        let wrongAnswers = type.w.sort(() => 0.5 - Math.random()).slice(0, 2);
        let options = [type.a, ...wrongAnswers].map(formatMath).sort(() => 0.5 - Math.random());

        return { text: type.q, correct: formatMath(type.a), options: options };
    }

    function spawnQuestion() {
        currentQuestion = generateMathProblem();
        document.getElementById('question-box').innerText = currentQuestion.text;
        
        answersLayer.innerHTML = '';
        answers = [];

        for(let i=0; i<3; i++) {
            let w = 120; 
            let h = 50;  
            let x = 50 + Math.random() * (canvas.width - w - 100); 
            let y = 100 + Math.random() * (canvas.height - h - 150);
            
            answers.push({
                x: x, y: y, width: w, height: h,
                text: currentQuestion.options[i],
                isCorrect: currentQuestion.options[i] === currentQuestion.correct
            });

            let div = document.createElement('div');
            div.className = 'answer-box';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            div.innerHTML = currentQuestion.options[i];
            answersLayer.appendChild(div);
        }
        questionActive = true;
    }

    // Logic
    function handlePlayerMovement() {
        if (keys['KeyW'] || keys['Keyw']) player.y -= player.speed;
        if (keys['KeyS'] || keys['Keys']) player.y += player.speed;
        if (keys['KeyA'] || keys['Keya']) player.x -= player.speed;
        if (keys['KeyD'] || keys['Keyd']) player.x += player.speed;

        player.x = Math.max(player.size/2, Math.min(canvas.width - player.size/2, player.x));
        player.y = Math.max(player.size/2 + 50, Math.min(canvas.height - player.size/2, player.y));
    }

    function handleShooting(now) {
        // Manual Shooting
        let dx = 0, dy = 0;
        if (keys['ArrowUp']) dy = -1;
        else if (keys['ArrowDown']) dy = 1;
        else if (keys['ArrowLeft']) dx = -1;
        else if (keys['ArrowRight']) dx = 1;

        if ((dx !== 0 || dy !== 0) && now - player.lastShot > player.fireRate) {
            bullets.push({
                x: player.x, y: player.y,
                vx: dx * 7, vy: dy * 7,
                size: 6, damage: player.damage
            });
            player.lastShot = now;
        }

        // Auto-Turret Shooting
        if (autoShootLevel > 0) {
            let autoCooldown = Math.max(300, 2000 - (autoShootLevel * 300));
            if (now - lastAutoShoot > autoCooldown) {
                let nearest = null;
                let minDist = Infinity;
                
                enemies.forEach(e => {
                    let d = Math.hypot(player.x - e.x, player.y - e.y);
                    if (d < minDist) { minDist = d; nearest = e; }
                });

                if (nearest) {
                    let angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
                    bullets.push({
                        x: player.x, y: player.y,
                        vx: Math.cos(angle) * 7, vy: Math.sin(angle) * 7,
                        size: 6, damage: player.damage
                    });
                    lastAutoShoot = now;
                }
            }
        }
    }

    function spawnEnemy() {
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -20 : canvas.width + 20;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -20 : canvas.height + 20;
        }
        
        let enemySpeed = 0.3 + Math.random() * 0.4;
        let hpScale = 2 + Math.floor(questionsAnswered / 5);

        enemies.push({
            x: x, y: y, radius: 12, speed: enemySpeed, health: hpScale, lastOrbHit: 0
        });
    }

    function checkAnswerCollisions() {
        if (!questionActive) return;

        answers.forEach(ans => {
            if (player.x > ans.x - player.size/2 && player.x < ans.x + ans.width + player.size/2 &&
                player.y > ans.y - player.size/2 && player.y < ans.y + ans.height + player.size/2) {
                
                questionActive = false;
                answers = [];
                answersLayer.innerHTML = '';
                
                let fbText = document.getElementById('feedback-box');

                if (ans.isCorrect) {
                    coins += 10;
                    questionsAnswered++;
                    fbText.innerHTML = `<span class="correct">Correct! +10 Coins</span>`;
                } else {
                    fbText.innerHTML = `<span class="wrong">Wrong! Correct was: ${currentQuestion.correct}</span>`;
                }
                
                document.getElementById('question-box').innerText = "Next question arriving shortly...";
                updateUI();

                setTimeout(() => {
                    fbText.innerHTML = "";
                    if (!isGameOver) spawnQuestion();
                }, 5000);
            }
        });
    }

    function updateEntities(now) {
        // Orbiters positions calculation
        orbiterAngle += 0.04;
        let orbiterPositions = [];
        let orbRadius = 45;
        for (let i = 0; i < numOrbiters; i++) {
            let angle = orbiterAngle + (i * Math.PI * 2 / numOrbiters);
            orbiterPositions.push({
                x: player.x + Math.cos(angle) * orbRadius,
                y: player.y + Math.sin(angle) * orbRadius,
                size: 10
            });
        }

        // Bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                bullets.splice(i, 1);
            }
        }

        // Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let dx = player.x - e.x;
            let dy = player.y - e.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            e.x += (dx/dist) * e.speed;
            e.y += (dy/dist) * e.speed;

            // Collision with player
            if (dist < player.size/2 + e.radius) {
                player.health -= 1;
                enemies.splice(i, 1);
                updateUI();
                if (player.health <= 0) gameOver();
                continue;
            }

            // Collision with Orbiters
            for (let o of orbiterPositions) {
                let odx = o.x - e.x;
                let ody = o.y - e.y;
                if (Math.sqrt(odx*odx + ody*ody) < e.radius + o.size/2) {
                    if (now - e.lastOrbHit > 500) { // 500ms iframe for orb hits
                        e.health -= player.damage;
                        e.lastOrbHit = now;
                        // Knockback
                        let kbAngle = Math.atan2(e.y - player.y, e.x - player.x);
                        e.x += Math.cos(kbAngle) * 20;
                        e.y += Math.sin(kbAngle) * 20;
                    }
                }
            }

            if (e.health <= 0) {
                enemies.splice(i, 1);
                coins += 1;
                updateUI();
                continue; 
            }

            // Collision with bullets
            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                let bdx = b.x - e.x;
                let bdy = b.y - e.y;
                if (Math.sqrt(bdx*bdx + bdy*bdy) < e.radius + b.size/2) {
                    e.health -= b.damage;
                    bullets.splice(j, 1);
                    if (e.health <= 0) {
                        enemies.splice(i, 1);
                        coins += 1;
                        updateUI();
                    }
                    break;
                }
            }
        }
    }

    // Drawing 
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player
        ctx.fillStyle = '#000';
        ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);

        // Draw Orbiters
        ctx.fillStyle = '#000';
        let orbRadius = 45;
        for (let i = 0; i < numOrbiters; i++) {
            let angle = orbiterAngle + (i * Math.PI * 2 / numOrbiters);
            let ox = player.x + Math.cos(angle) * orbRadius;
            let oy = player.y + Math.sin(angle) * orbRadius;
            
            // Draw as hollow squares to look slightly different from player/bullets
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(ox - 5, oy - 5, 10, 10);
        }

        // Draw Bullets
        ctx.fillStyle = '#333';
        bullets.forEach(b => {
            ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);
        });

        // Draw Enemies 
        enemies.forEach(e => {
            // Flash red if recently hit by orb
            if (performance.now() - e.lastOrbHit < 100) {
                ctx.fillStyle = '#e74c3c';
            } else {
                ctx.fillStyle = '#000';
            }
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function updateUI() {
        document.getElementById('ui-health').innerText = player.health;
        document.getElementById('ui-coins').innerText = coins;
        document.getElementById('shop-coins').innerText = coins;
    }

    function gameOver() {
        isGameOver = true;
        document.getElementById('game-over-menu').style.display = 'block';
    }

    // Shop Logic
    const shopMenu = document.getElementById('shop-menu');
    function toggleShop() {
        if (isGameOver) return;
        isPaused = !isPaused;
        shopMenu.style.display = isPaused ? 'block' : 'none';
        answersLayer.style.display = isPaused ? 'none' : 'block'; 
        if (!isPaused) requestAnimationFrame(gameLoop);
        updateUI();
    }

    document.getElementById('btn-shop-open').addEventListener('click', toggleShop);
    document.getElementById('btn-shop-close').addEventListener('click', toggleShop);
    
    window.addEventListener('keydown', e => {
        if (e.code === 'Space') {
            toggleShop();
            e.preventDefault(); 
        }
    });

    // Upgrade buttons
    document.getElementById('upg-speed').addEventListener('click', () => {
        if (coins >= costs.speed) { coins -= costs.speed; player.speed += 0.5; costs.speed = Math.floor(costs.speed * 1.5); updateUI(); document.getElementById('cost-speed').innerText = costs.speed; }
    });
    document.getElementById('upg-fire').addEventListener('click', () => {
        if (coins >= costs.fire && player.fireRate > 100) { coins -= costs.fire; player.fireRate -= 50; costs.fire = Math.floor(costs.fire * 1.5); updateUI(); document.getElementById('cost-fire').innerText = costs.fire; }
    });
    document.getElementById('upg-dmg').addEventListener('click', () => {
        if (coins >= costs.dmg) { coins -= costs.dmg; player.damage += 1; costs.dmg = Math.floor(costs.dmg * 2); updateUI(); document.getElementById('cost-dmg').innerText = costs.dmg; }
    });
    document.getElementById('upg-hp').addEventListener('click', () => {
        if (coins >= costs.hp) { coins -= costs.hp; player.maxHealth += 2; player.health = player.maxHealth; costs.hp = Math.floor(costs.hp * 1.5); updateUI(); document.getElementById('cost-hp').innerText = costs.hp; }
    });
    
    // New Upgrades
    document.getElementById('upg-orb').addEventListener('click', () => {
        if (coins >= costs.orb) { coins -= costs.orb; numOrbiters += 1; costs.orb = Math.floor(costs.orb * 1.6); updateUI(); document.getElementById('cost-orb').innerText = costs.orb; }
    });
    document.getElementById('upg-auto').addEventListener('click', () => {
        if (coins >= costs.auto) { coins -= costs.auto; autoShootLevel += 1; costs.auto = Math.floor(costs.auto * 1.8); updateUI(); document.getElementById('cost-auto').innerText = costs.auto; }
    });

    // Main Game Loop
    let lastEnemySpawn = 0;
    function gameLoop(now) {
        if (isPaused || isGameOver) return;

        handlePlayerMovement();
        handleShooting(now);
        updateEntities(now);
        checkAnswerCollisions();
        draw();

        // Spawn logic speeds up slightly as you answer questions
        let spawnRate = Math.max(800, 2000 - (questionsAnswered * 50));
        if (now - lastEnemySpawn > spawnRate) { 
            spawnEnemy();
            lastEnemySpawn = now;
        }

        requestAnimationFrame(gameLoop);
    }

    // Start
    spawnQuestion();
    updateUI();
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
