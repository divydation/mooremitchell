<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Arena</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #000;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #fff;
            border: 4px solid #000;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #top-bar {
            background-color: rgba(255, 255, 255, 0.9);
            border-bottom: 2px solid #000;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #question-box {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;
        }

        #stats {
            font-size: 16px;
            white-space: nowrap;
        }

        #feedback-box {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }

        #answers-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .answer-box {
            position: absolute;
            background: #fff;
            border: 2px solid #000;
            box-sizing: border-box;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 5px;
            font-size: 16px;
        }
        .fraction .num { border-bottom: 2px solid #000; padding: 0 4px; }
        .fraction .den { padding: 0 4px; }

        .menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            border: 4px solid #000;
            padding: 20px;
            text-align: center;
            pointer-events: auto;
            display: none;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            max-height: 80vh;
            overflow-y: auto;
            width: 320px;
            z-index: 10;
        }

        .menu h2 { margin-top: 0; }
        .menu button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 8px;
            font-family: inherit;
            font-size: 14px;
            background-color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu button:hover {
            background-color: #000;
            color: #fff;
        }
        
        .menu select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-family: inherit;
            border: 2px solid #000;
        }

        .ui-btn {
            pointer-events: auto;
            font-family: inherit;
            background: #fff;
            border: 2px solid #000;
            padding: 5px 10px;
            cursor: pointer;
        }
        .ui-btn:hover { background: #000; color: #fff; }

        #btn-container {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .danger-btn {
            color: #e74c3c;
            border-color: #e74c3c !important;
        }
        .danger-btn:hover {
            background-color: #e74c3c !important;
            color: #fff !important;
        }

        #custom-diff-container {
            display: none;
            text-align: center;
            margin: 10px 0;
            background: #f9f9f9;
            padding: 10px;
            border: 2px dashed #000;
        }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div id="top-bar">
            <div id="stats">HP: <span id="ui-health">10</span> | Coins: <span id="ui-coins">0</span></div>
            <div id="question-box">Loading...</div>
            <div style="width: 150px;"></div>
        </div>
        
        <div id="answers-layer"></div>
        <div id="feedback-box"></div>
        
        <div id="btn-container">
            <button id="btn-settings-open" class="ui-btn">Settings</button>
            <button id="btn-shop-open" class="ui-btn">Shop (Space)</button>
        </div>
    </div>

    <div id="shop-menu" class="menu">
        <h2>Upgrades</h2>
        <p>Coins: <span id="shop-coins">0</span></p>
        <button id="upg-speed">Move Speed (Cost: <span id="cost-speed">10</span>)</button>
        <button id="upg-fire">Fire Rate (Cost: <span id="cost-fire">15</span>)</button>
        <button id="upg-dmg">Damage (Cost: <span id="cost-dmg">20</span>)</button>
        <hr>
        <button id="upg-orb">Orbiting Orb (Cost: <span id="cost-orb">30</span>)</button>
        <button id="upg-auto">Auto-Turret (Cost: <span id="cost-auto">40</span>)</button>
        <button id="upg-trail">Toxic Trail (Cost: <span id="cost-trail">35</span>)</button>
        <button id="upg-spread">Spread Shot (Cost: <span id="cost-spread">45</span>)</button>
        <button id="upg-mirror">Mirror Shot (Cost: <span id="cost-mirror">50</span>)</button>
        <button id="upg-multi">Multi-Shot (Cost: <span id="cost-multi">60</span>)</button>
        <button id="upg-pet">Pet Drone Swarm (Cost: <span id="cost-pet">50</span>)</button>
        <button id="btn-shop-close" style="margin-top: 15px; border-style: dashed;">Resume</button>
    </div>

    <div id="settings-menu" class="menu">
        <h2>Settings</h2>
        <label>Difficulty:</label>
        <select id="set-diff">
            <option value="0">Peaceful (No Enemies)</option>
            <option value="0.5">Easy (Fewer Enemies)</option>
            <option value="1" selected>Normal</option>
            <option value="2">Hard (More Enemies)</option>
            <option value="3">Extra Hard (Swarm & Tougher)</option>
            <option value="custom">Custom Multiplier (Infinite Scaling)</option>
        </select>

        <div id="custom-diff-container">
            <label>Multiplier Tier:</label>
            <div style="display:flex; justify-content:center; align-items:center; gap: 10px; margin-top: 5px;">
                <button id="btn-diff-down" class="ui-btn" style="width: 40px; margin: 0;">-</button>
                <span id="custom-diff-val" style="font-size: 20px; font-weight: bold; width: 40px;">1</span>
                <button id="btn-diff-up" class="ui-btn" style="width: 40px; margin: 0;">+</button>
            </div>
            <small style="display:block; margin-top: 5px; color: #555;">Increases enemy HP, speed, and spawn rate infinitely.</small>
        </div>
        
        <label>Controls:</label>
        <select id="set-ctrl">
            <option value="false" selected>Move: WASD | Shoot: Arrows</option>
            <option value="true">Move: Arrows | Shoot: WASD</option>
        </select>
        
        <hr>
        <button id="btn-save-game">Save Game Manually</button>
        <button id="btn-reset-game" class="danger-btn">Wipe Save Data</button>

        <button id="btn-settings-close" style="margin-top: 20px; border-style: dashed;">Resume</button>
    </div>

    <div id="game-over-menu" class="menu">
        <h2>Game Over</h2>
        <p>You survived and learned algebra.</p>
        <button onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const answersLayer = document.getElementById('answers-layer');

    // Game Settings
    let appSettings = {
        difficulty: 1, 
        customDiff: 1,
        swapControls: false 
    };

    // Game State
    let isPaused = false;
    let isGameOver = false;
    let coins = 0;
    let questionsAnswered = 0;
    
    // Entities
    const player = {
        x: 400, y: 300, size: 20, 
        speed: 3, maxHealth: 10, health: 10,
        damage: 1, fireRate: 500,
        lastShot: 0
    };

    // Special Upgrades
    let numOrbiters = 0;
    let orbiterAngle = 0;
    
    let autoShootLevel = 0;
    let lastAutoShoot = 0;

    let trailLevel = 0;
    let trailDrops = [];
    let lastTrailDrop = 0;

    let spreadLevel = 0; 
    let mirrorLevel = 0;
    let multiLevel = 0;

    let petLevel = 0;
    let petsData = [];

    let bullets = [];
    let enemies = [];
    let answers = [];
    
    let currentQuestion = null;
    let questionActive = false;

    // Upgrades Cost
    let costs = { speed: 10, fire: 15, dmg: 20, orb: 30, auto: 40, trail: 35, spread: 45, mirror: 50, multi: 60, pet: 50 };

    // --- SAVE & LOAD SYSTEM ---
    function saveGame() {
        const saveData = {
            coins, questionsAnswered,
            pSpeed: player.speed, pMaxHp: player.maxHealth,
            pDmg: player.damage, pFireRate: player.fireRate,
            numOrbiters, autoShootLevel, trailLevel, spreadLevel, 
            mirrorLevel, multiLevel, petLevel,
            costs, customDiff: appSettings.customDiff
        };
        localStorage.setItem('algebraArenaSave', JSON.stringify(saveData));
    }

    function loadGame() {
        const saved = localStorage.getItem('algebraArenaSave');
        if (saved) {
            const data = JSON.parse(saved);
            coins = data.coins || 0;
            questionsAnswered = data.questionsAnswered || 0;
            player.speed = data.pSpeed || 3;
            player.maxHealth = data.pMaxHp || 10;
            player.health = player.maxHealth; 
            player.damage = data.pDmg || 1;
            player.fireRate = data.pFireRate || 500;

            numOrbiters = data.numOrbiters || 0;
            autoShootLevel = data.autoShootLevel || 0;
            trailLevel = data.trailLevel || 0;
            spreadLevel = data.spreadLevel || 0;
            mirrorLevel = data.mirrorLevel || 0;
            multiLevel = data.multiLevel || 0;
            petLevel = data.petLevel || 0;
            
            appSettings.customDiff = data.customDiff || 1;
            document.getElementById('custom-diff-val').innerText = appSettings.customDiff;

            if (data.costs) {
                costs = data.costs;
                if (!costs.mirror) costs.mirror = 50;
                if (!costs.multi) costs.multi = 60;
            }

            document.getElementById('cost-speed').innerText = costs.speed;
            document.getElementById('cost-fire').innerText = costs.fire;
            document.getElementById('cost-dmg').innerText = costs.dmg;
            document.getElementById('cost-orb').innerText = costs.orb;
            document.getElementById('cost-auto').innerText = costs.auto;
            document.getElementById('cost-trail').innerText = costs.trail;
            document.getElementById('cost-spread').innerText = costs.spread;
            document.getElementById('cost-mirror').innerText = costs.mirror;
            document.getElementById('cost-multi').innerText = costs.multi;
            document.getElementById('cost-pet').innerText = costs.pet;

            petsData = [];
            for(let i=0; i<petLevel; i++) {
                petsData.push({ x: player.x, y: player.y, lastShot: 0 });
            }
        }
    }

    document.getElementById('btn-save-game').addEventListener('click', () => {
        saveGame();
        alert("Game Saved Successfully!");
    });

    document.getElementById('btn-reset-game').addEventListener('click', () => {
        if(confirm("Are you sure you want to completely wipe your save data? This cannot be undone.")) {
            localStorage.removeItem('algebraArenaSave');
            location.reload();
        }
    });

    // Input Handling
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // Math Question Generator 
    function generateMathProblem() {
        const difficulty = Math.floor(questionsAnswered / 3);
        
        const variables = ['x', 'y', 'a', 'b', 'n'];
        const v = variables[Math.floor(Math.random() * variables.length)];
        const n1 = Math.floor(Math.random() * 8) + 2;
        const n2 = Math.floor(Math.random() * 8) + 2; 

        let templates = [];

        templates.push(
            { q: `${n1} more than ${v}`, a: `${v} + ${n1}`, w: [`${n1}${v}`, `${v} - ${n1}`, `${n1} - ${v}`] },
            { q: `${n1} less than ${v}`, a: `${v} - ${n1}`, w: [`${v} + ${n1}`, `${n1} - ${v}`, `${n1}${v}`] },
            { q: `the product of ${n1} and ${v}`, a: `${n1}${v}`, w: [`${v} + ${n1}`, `frac(${v},${n1})`, `frac(${n1},${v})`] }
        );

        if (difficulty >= 1) {
            templates.push(
                { q: `the quotient of ${v} and ${n1}`, a: `frac(${v},${n1})`, w: [`frac(${n1},${v})`, `${n1}${v}`, `${v} - ${n1}`] }
            );
        }

        if (difficulty >= 2) {
            templates.push(
                { q: `the sum of ${n1} and ${v}, multiplied by ${n2}`, a: `${n2}(${v} + ${n1})`, w: [`${n2}${v} + ${n1}`, `${v}(${n2} + ${n1})`, `${n1}(${v} + ${n2})`] },
                { q: `${n2} less than the quotient of ${v} and ${n1}`, a: `frac(${v},${n1}) - ${n2}`, w: [`frac(${v},${n2}) - ${n1}`, `frac(${v} - ${n2},${n1})`, `${n2} - frac(${v},${n1})`] }
            );
        }

        let type = templates[Math.floor(Math.random() * templates.length)];
        
        const formatMath = (str) => {
            return str.replace(/frac\(([^,]+),([^)]+)\)/g, '<div class="fraction"><span class="num">$1</span><span class="den">$2</span></div>');
        };

        let wrongAnswers = type.w.sort(() => 0.5 - Math.random()).slice(0, 2);
        let options = [type.a, ...wrongAnswers].map(formatMath).sort(() => 0.5 - Math.random());

        return { text: type.q, correct: formatMath(type.a), options: options };
    }

    function spawnQuestion() {
        currentQuestion = generateMathProblem();
        document.getElementById('question-box').innerText = currentQuestion.text;
        
        answersLayer.innerHTML = '';
        answers = [];

        let w = 120, h = 50;
        let quadrants = [
            { xMin: 50, xMax: 300, yMin: 80, yMax: 250 }, 
            { xMin: 450, xMax: 650, yMin: 80, yMax: 250 }, 
            { xMin: 50, xMax: 300, yMin: 350, yMax: 500 }, 
            { xMin: 450, xMax: 650, yMin: 350, yMax: 500 } 
        ];

        quadrants.sort(() => 0.5 - Math.random());

        for(let i=0; i<3; i++) {
            let q = quadrants[i];
            let x, y, dist;
            let attempts = 0;
            
            do {
                x = q.xMin + Math.random() * (q.xMax - q.xMin);
                y = q.yMin + Math.random() * (q.yMax - q.yMin);
                dist = Math.hypot((x + w/2) - player.x, (y + h/2) - player.y);
                attempts++;
            } while (dist < 100 && attempts < 10); 

            answers.push({
                x: x, y: y, width: w, height: h,
                text: currentQuestion.options[i],
                isCorrect: currentQuestion.options[i] === currentQuestion.correct
            });

            let div = document.createElement('div');
            div.className = 'answer-box';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            div.innerHTML = currentQuestion.options[i];
            answersLayer.appendChild(div);
        }
        questionActive = true;
    }

    function handlePlayerMovement() {
        let up = appSettings.swapControls ? keys['ArrowUp'] : (keys['KeyW'] || keys['Keyw']);
        let down = appSettings.swapControls ? keys['ArrowDown'] : (keys['KeyS'] || keys['Keys']);
        let left = appSettings.swapControls ? keys['ArrowLeft'] : (keys['KeyA'] || keys['Keya']);
        let right = appSettings.swapControls ? keys['ArrowRight'] : (keys['KeyD'] || keys['Keyd']);

        if (up) player.y -= player.speed;
        if (down) player.y += player.speed;
        if (left) player.x -= player.speed;
        if (right) player.x += player.speed;

        player.x = Math.max(player.size/2, Math.min(canvas.width - player.size/2, player.x));
        player.y = Math.max(player.size/2 + 50, Math.min(canvas.height - player.size/2, player.y));
    }

    function fireBullet(x, y, angle) {
        bullets.push({
            x: x, y: y,
            vx: Math.cos(angle) * 7, 
            vy: Math.sin(angle) * 7,
            size: 6, 
            damage: player.damage
        });
    }

    function executeWeaponFire(originX, originY, aimAngle) {
        let numMirrors = mirrorLevel + 1;
        let mirrorAngleInc = (Math.PI * 2) / numMirrors;

        for (let m = 0; m < numMirrors; m++) {
            let mirrorBaseAngle = aimAngle + (m * mirrorAngleInc);

            for (let s = -spreadLevel; s <= spreadLevel; s++) {
                let finalAngle = mirrorBaseAngle + (s * 0.25);
                
                let numMulti = multiLevel + 1;
                let perpAngle = finalAngle + Math.PI / 2;
                let spacing = 8; 
                
                for (let p = 0; p < numMulti; p++) {
                    let offsetMult = p - (multiLevel / 2);
                    let bx = originX + Math.cos(perpAngle) * (offsetMult * spacing);
                    let by = originY + Math.sin(perpAngle) * (offsetMult * spacing);
                    
                    fireBullet(bx, by, finalAngle);
                }
            }
        }
    }

    function handleShooting(now) {
        let sUp = appSettings.swapControls ? (keys['KeyW'] || keys['Keyw']) : keys['ArrowUp'];
        let sDown = appSettings.swapControls ? (keys['KeyS'] || keys['Keys']) : keys['ArrowDown'];
        let sLeft = appSettings.swapControls ? (keys['KeyA'] || keys['Keya']) : keys['ArrowLeft'];
        let sRight = appSettings.swapControls ? (keys['KeyD'] || keys['Keyd']) : keys['ArrowRight'];

        let dx = 0, dy = 0;
        if (sUp) dy = -1;
        else if (sDown) dy = 1;
        else if (sLeft) dx = -1;
        else if (sRight) dx = 1;

        if ((dx !== 0 || dy !== 0) && now - player.lastShot > player.fireRate) {
            let baseAngle = Math.atan2(dy, dx);
            executeWeaponFire(player.x, player.y, baseAngle);
            player.lastShot = now;
        }

        if (autoShootLevel > 0) {
            let autoCooldown = Math.max(300, 2000 - (autoShootLevel * 300));
            if (now - lastAutoShoot > autoCooldown) {
                let nearest = null;
                let minDist = Infinity;
                
                enemies.forEach(e => {
                    let d = Math.hypot(player.x - e.x, player.y - e.y);
                    if (d < minDist) { minDist = d; nearest = e; }
                });

                if (nearest) {
                    let angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
                    executeWeaponFire(player.x, player.y, angle);
                    lastAutoShoot = now;
                }
            }
        }
    }

    function handlePets(now) {
        if (petLevel <= 0) return;

        let orbitRadius = 60 + (petLevel * 2); 
        let basePetAngle = now / 1000; 

        for (let i = 0; i < petLevel; i++) {
            if (!petsData[i]) petsData.push({ x: player.x, y: player.y, lastShot: 0 });
            let p = petsData[i];

            let targetAngle = basePetAngle + (i * Math.PI * 2 / petLevel);
            let targetX = player.x + Math.cos(targetAngle) * orbitRadius;
            let targetY = player.y + Math.sin(targetAngle) * orbitRadius;

            p.x += (targetX - p.x) * 0.08;
            p.y += (targetY - p.y) * 0.08;

            if (now - p.lastShot > player.fireRate) {
                let nearest = null;
                let minDist = Infinity;
                
                enemies.forEach(e => {
                    let d = Math.hypot(p.x - e.x, p.y - e.y);
                    if (d < minDist) { minDist = d; nearest = e; }
                });

                if (nearest) {
                    let angle = Math.atan2(nearest.y - p.y, nearest.x - p.x);
                    executeWeaponFire(p.x, p.y, angle);
                    p.lastShot = now;
                }
            }
        }
    }

    function spawnEnemy() {
        if (appSettings.difficulty === 0) return; 

        let diffMult = appSettings.difficulty === 'custom' ? appSettings.customDiff : parseFloat(appSettings.difficulty);

        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -20 : canvas.width + 20;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -20 : canvas.height + 20;
        }
        
        let rand = Math.random();
        let isBrute = false;
        let isStalker = false;

        if (questionsAnswered > 4 && rand < 0.20) {
            isStalker = true;
        } else if (questionsAnswered > 2 && rand < 0.40) {
            isBrute = true;
        }
        
        let radius = isBrute ? 24 : (isStalker ? 8 : 12);
        
        // Base speeds for archetypes
        let enemySpeed = isBrute ? (0.15 + Math.random() * 0.15) : (isStalker ? (0.8 + Math.random() * 0.4) : (0.3 + Math.random() * 0.4));
        
        // Scale speed moderately using square root so they don't break the sound barrier
        enemySpeed *= Math.max(1, Math.sqrt(diffMult));

        // Base HP scaling
        let hpScale = 2 + Math.floor(questionsAnswered / 5);
        if (isBrute) hpScale *= 4; 
        if (isStalker) hpScale = Math.max(1, Math.floor(hpScale / 2));
        
        // Apply infinite multiplier to HP
        hpScale = Math.floor(hpScale * diffMult);
        if(hpScale < 1) hpScale = 1;

        enemies.push({
            x: x, y: y, radius: radius, speed: enemySpeed, health: hpScale, lastHitTime: 0, isBrute: isBrute, isStalker: isStalker
        });
    }

    function checkAnswerCollisions() {
        if (!questionActive) return;

        answers.forEach(ans => {
            if (player.x > ans.x - player.size/2 && player.x < ans.x + ans.width + player.size/2 &&
                player.y > ans.y - player.size/2 && player.y < ans.y + ans.height + player.size/2) {
                
                questionActive = false;
                answers = [];
                answersLayer.innerHTML = '';
                
                let fbText = document.getElementById('feedback-box');

                if (ans.isCorrect) {
                    let reward = 10 + questionsAnswered; 
                    coins += reward;
                    questionsAnswered++;
                    player.health = Math.min(player.maxHealth, player.health + 2); 
                    fbText.innerHTML = `<span class="correct">Correct! +${reward} Coins & +2 HP</span>`;
                    saveGame(); 
                } else {
                    fbText.innerHTML = `<span class="wrong">Wrong! Correct was: ${currentQuestion.correct}</span>`;
                }
                
                document.getElementById('question-box').innerText = "Next question arriving shortly...";
                updateUI();

                setTimeout(() => {
                    fbText.innerHTML = "";
                    if (!isGameOver) spawnQuestion();
                }, 5000);
            }
        });
    }

    function updateEntities(now) {
        if (appSettings.difficulty === 0) enemies = [];

        if (trailLevel > 0 && now - lastTrailDrop > 250) {
            trailDrops.push({ x: player.x, y: player.y, spawnTime: now, size: 20 + trailLevel * 5 });
            
            if (petLevel > 0) {
                petsData.forEach(p => {
                    trailDrops.push({ x: p.x, y: p.y, spawnTime: now, size: 20 + trailLevel * 5 });
                });
            }
            lastTrailDrop = now;
        }
        trailDrops = trailDrops.filter(t => now - t.spawnTime < 3000);

        orbiterAngle += 0.04;
        let orbiterPositions = [];
        let orbRadius = 45;
        for (let i = 0; i < numOrbiters; i++) {
            let angle = orbiterAngle + (i * Math.PI * 2 / numOrbiters);
            orbiterPositions.push({ x: player.x + Math.cos(angle) * orbRadius, y: player.y + Math.sin(angle) * orbRadius, size: 10 });
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                bullets.splice(i, 1);
            }
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let dx = player.x - e.x;
            let dy = player.y - e.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            e.x += (dx/dist) * e.speed;
            e.y += (dy/dist) * e.speed;

            if (dist < player.size/2 + e.radius) {
                player.health -= e.isBrute ? 2 : 1;
                enemies.splice(i, 1);
                updateUI();
                if (player.health <= 0) gameOver();
                continue;
            }

            const tryDamageEnemy = (dmg, knockbackSrcX, knockbackSrcY, force) => {
                if (now - e.lastHitTime > 300) { 
                    e.health -= dmg;
                    e.lastHitTime = now;
                    if (force && !e.isBrute) { 
                        let kbAngle = Math.atan2(e.y - knockbackSrcY, e.x - knockbackSrcX);
                        e.x += Math.cos(kbAngle) * force;
                        e.y += Math.sin(kbAngle) * force;
                    }
                }
            };

            for (let o of orbiterPositions) {
                if (Math.hypot(o.x - e.x, o.y - e.y) < e.radius + o.size/2) {
                    tryDamageEnemy(player.damage, player.x, player.y, 20); 
                }
            }

            for (let t of trailDrops) {
                if (Math.hypot(t.x - e.x, t.y - e.y) < e.radius + t.size/2) {
                    tryDamageEnemy(player.damage, 0, 0, 0); 
                }
            }

            if (e.health <= 0) {
                enemies.splice(i, 1);
                coins += e.isBrute ? 3 : (e.isStalker ? 2 : 1); 
                updateUI();
                continue; 
            }

            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + b.size/2) {
                    e.health -= b.damage;
                    bullets.splice(j, 1);
                    if (e.health <= 0) {
                        enemies.splice(i, 1);
                        coins += e.isBrute ? 3 : (e.isStalker ? 2 : 1);
                        updateUI();
                    }
                    break;
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'rgba(46, 204, 113, 0.4)'; 
        trailDrops.forEach(t => {
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.size/2, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.fillStyle = '#000';
        ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);

        if (petLevel > 0) {
            petsData.forEach(p => {
                ctx.fillStyle = '#3498db'; 
                let pSize = 12;
                ctx.fillRect(p.x - pSize/2, p.y - pSize/2, pSize, pSize);
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            });
        }

        ctx.fillStyle = '#000';
        let orbRadius = 45;
        for (let i = 0; i < numOrbiters; i++) {
            let angle = orbiterAngle + (i * Math.PI * 2 / numOrbiters);
            let ox = player.x + Math.cos(angle) * orbRadius;
            let oy = player.y + Math.sin(angle) * orbRadius;
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(ox - 5, oy - 5, 10, 10);
        }

        ctx.fillStyle = '#333';
        bullets.forEach(b => {
            ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);
        });

        enemies.forEach(e => {
            if (performance.now() - e.lastHitTime < 100) ctx.fillStyle = '#e74c3c';
            else if (e.isStalker) ctx.fillStyle = '#8e44ad'; // Purple Void Stalker
            else ctx.fillStyle = e.isBrute ? '#2c3e50' : '#000'; 

            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
            ctx.fill();

            if ((e.isBrute || e.isStalker) && e.health > 1) {
                ctx.fillStyle = '#fff';
                ctx.font = e.isStalker ? '8px Arial' : '10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(Math.ceil(e.health), e.x, e.y + (e.isStalker ? 3 : 4));
            }
        });
    }

    function updateUI() {
        document.getElementById('ui-health').innerText = player.health;
        document.getElementById('ui-coins').innerText = coins;
        document.getElementById('shop-coins').innerText = coins;
    }

    function gameOver() {
        isGameOver = true;
        document.getElementById('game-over-menu').style.display = 'block';
    }

    // Menu Management
    const shopMenu = document.getElementById('shop-menu');
    const settingsMenu = document.getElementById('settings-menu');

    function closeAllMenus() {
        shopMenu.style.display = 'none';
        settingsMenu.style.display = 'none';
    }

    function toggleMenu(menuElement) {
        if (isGameOver) return;
        
        if (menuElement.style.display === 'block') {
            isPaused = false;
            closeAllMenus();
            answersLayer.style.display = 'block'; 
            requestAnimationFrame(gameLoop);
        } else {
            isPaused = true;
            closeAllMenus();
            menuElement.style.display = 'block';
            answersLayer.style.display = 'none'; 
        }
        updateUI();
    }

    document.getElementById('btn-shop-open').addEventListener('click', () => toggleMenu(shopMenu));
    document.getElementById('btn-shop-close').addEventListener('click', () => toggleMenu(shopMenu));
    
    document.getElementById('btn-settings-open').addEventListener('click', () => toggleMenu(settingsMenu));
    document.getElementById('btn-settings-close').addEventListener('click', () => toggleMenu(settingsMenu));
    
    window.addEventListener('keydown', e => {
        if (e.code === 'Space') {
            if(settingsMenu.style.display === 'block') toggleMenu(settingsMenu);
            else toggleMenu(shopMenu);
            e.preventDefault(); 
        }
    });

    // Modified Settings Listeners for Infinite Custom Difficulty
    document.getElementById('set-diff').addEventListener('change', (e) => {
        let val = e.target.value;
        if(val === 'custom') {
            appSettings.difficulty = 'custom';
            document.getElementById('custom-diff-container').style.display = 'block';
        } else {
            appSettings.difficulty = parseFloat(val);
            document.getElementById('custom-diff-container').style.display = 'none';
        }
    });

    document.getElementById('btn-diff-down').addEventListener('click', () => {
        if (appSettings.customDiff > 1) {
            appSettings.customDiff -= 1;
            document.getElementById('custom-diff-val').innerText = appSettings.customDiff;
            saveGame();
        }
    });

    document.getElementById('btn-diff-up').addEventListener('click', () => {
        appSettings.customDiff += 1;
        document.getElementById('custom-diff-val').innerText = appSettings.customDiff;
        saveGame();
    });

    document.getElementById('set-ctrl').addEventListener('change', (e) => {
        appSettings.swapControls = e.target.value === 'true';
    });

    // Upgrades
    document.getElementById('upg-speed').addEventListener('click', () => {
        if (coins >= costs.speed) { coins -= costs.speed; player.speed += 0.5; costs.speed = Math.floor(costs.speed * 1.5); updateUI(); saveGame(); document.getElementById('cost-speed').innerText = costs.speed; }
    });
    document.getElementById('upg-fire').addEventListener('click', () => {
        if (coins >= costs.fire && player.fireRate > 20) { 
            coins -= costs.fire; 
            player.fireRate = Math.max(20, player.fireRate - 40); 
            costs.fire = Math.floor(costs.fire * 1.5); 
            updateUI(); 
            saveGame(); 
            document.getElementById('cost-fire').innerText = costs.fire; 
        }
    });
    document.getElementById('upg-dmg').addEventListener('click', () => {
        if (coins >= costs.dmg) { coins -= costs.dmg; player.damage += 1; costs.dmg = Math.floor(costs.dmg * 2); updateUI(); saveGame(); document.getElementById('cost-dmg').innerText = costs.dmg; }
    });
    document.getElementById('upg-orb').addEventListener('click', () => {
        if (coins >= costs.orb) { coins -= costs.orb; numOrbiters += 1; costs.orb = Math.floor(costs.orb * 1.6); updateUI(); saveGame(); document.getElementById('cost-orb').innerText = costs.orb; }
    });
    document.getElementById('upg-auto').addEventListener('click', () => {
        if (coins >= costs.auto) { coins -= costs.auto; autoShootLevel += 1; costs.auto = Math.floor(costs.auto * 1.8); updateUI(); saveGame(); document.getElementById('cost-auto').innerText = costs.auto; }
    });
    document.getElementById('upg-trail').addEventListener('click', () => {
        if (coins >= costs.trail) { coins -= costs.trail; trailLevel += 1; costs.trail = Math.floor(costs.trail * 1.7); updateUI(); saveGame(); document.getElementById('cost-trail').innerText = costs.trail; }
    });
    document.getElementById('upg-spread').addEventListener('click', () => {
        if (coins >= costs.spread) { coins -= costs.spread; spreadLevel += 1; costs.spread = Math.floor(costs.spread * 2); updateUI(); saveGame(); document.getElementById('cost-spread').innerText = costs.spread; }
    });
    document.getElementById('upg-mirror').addEventListener('click', () => {
        if (coins >= costs.mirror) { coins -= costs.mirror; mirrorLevel += 1; costs.mirror = Math.floor(costs.mirror * 2); updateUI(); saveGame(); document.getElementById('cost-mirror').innerText = costs.mirror; }
    });
    document.getElementById('upg-multi').addEventListener('click', () => {
        if (coins >= costs.multi) { coins -= costs.multi; multiLevel += 1; costs.multi = Math.floor(costs.multi * 2); updateUI(); saveGame(); document.getElementById('cost-multi').innerText = costs.multi; }
    });
    document.getElementById('upg-pet').addEventListener('click', () => {
        if (coins >= costs.pet) { coins -= costs.pet; petLevel += 1; costs.pet = Math.floor(costs.pet * 1.8); updateUI(); saveGame(); document.getElementById('cost-pet').innerText = costs.pet; }
    });

    // Main Game Loop
    let lastEnemySpawn = 0;
    function gameLoop(now) {
        if (isPaused || isGameOver) return;

        handlePlayerMovement();
        handleShooting(now);
        handlePets(now);
        updateEntities(now);
        checkAnswerCollisions();
        draw();

        if (appSettings.difficulty !== 0) {
            let diffMult = appSettings.difficulty === 'custom' ? appSettings.customDiff : parseFloat(appSettings.difficulty);
            let effectiveDiff = diffMult === 3 ? 2.5 : diffMult; 

            // Spawn rate accelerates aggressively with difficulty modifier
            let baseRate = Math.max(200, 2000 - (questionsAnswered * 50));
            let finalSpawnRate = baseRate / effectiveDiff;

            if (now - lastEnemySpawn > finalSpawnRate) { 
                spawnEnemy();
                lastEnemySpawn = now;
            }
        }

        requestAnimationFrame(gameLoop);
    }

    // Initialize Save Data First
    loadGame();
    
    // Start Game
    spawnQuestion();
    updateUI();
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
